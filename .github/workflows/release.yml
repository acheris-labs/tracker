name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0, no v prefix)'
        required: true
        type: string

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      # Random per-run password for the temporary signing keychain.
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
      NOTARY_PROFILE: tracker-notary
      # Sparkle: pin to the same version bundled in the app (see
      # Package.resolved). Must match exactly to avoid CLI/framework
      # signature-format drift.
      SPARKLE_VERSION: "2.9.2"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: v
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Pre-release if version contains a hyphen (e.g. 0.2.0-rc1).
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "→ tag=$TAG version=$VERSION"

      - name: Toolchain versions
        run: |
          sw_vers
          xcodebuild -version

      # --- Code signing setup ----------------------------------------------
      # Imports the Developer ID Application certificate from secrets into a
      # temporary keychain that's discarded at the end of the job.
      - name: Import signing certificate
        env:
          DEVID_CERT_P12:      ${{ secrets.DEVID_CERT_P12 }}
          DEVID_CERT_PASSWORD: ${{ secrets.DEVID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          : "${DEVID_CERT_P12:?missing DEVID_CERT_P12 secret}"
          : "${DEVID_CERT_PASSWORD:?missing DEVID_CERT_PASSWORD secret}"

          CERT_PATH="$RUNNER_TEMP/devid.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"

          echo "$DEVID_CERT_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$DEVID_CERT_PASSWORD" -T /usr/bin/codesign
          # Put our keychain first in the search list without losing the
          # system keychain (needed for Apple-trusted roots).
          OTHERS=$(security list-keychains -d user | sed -e 's/^ *//' -e 's/"//g' | grep -v "$KEYCHAIN_PATH" || true)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $OTHERS
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f "$CERT_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Store notarytool credentials
        env:
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APPLE_ID:?missing APPLE_ID secret}"
          : "${APPLE_TEAM_ID:?missing APPLE_TEAM_ID secret}"
          : "${APPLE_APP_PASSWORD:?missing APPLE_APP_PASSWORD secret}"
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id   "$APPLE_ID" \
            --team-id    "$APPLE_TEAM_ID" \
            --password   "$APPLE_APP_PASSWORD"

      # --- Build / sign / notarize / DMG -----------------------------------
      - name: Build (Release, versioned from tag)
        run: |
          xcodebuild -project Tracker.xcodeproj \
                     -scheme Tracker \
                     -configuration Release \
                     MARKETING_VERSION="${{ steps.v.outputs.version }}" \
                     CURRENT_PROJECT_VERSION="$(date +%s)" \
                     build

      - name: Sign, notarize, and build DMG
        env:
          DEVID_IDENTITY: ${{ secrets.DEVID_IDENTITY }}
        run: |
          set -euo pipefail
          : "${DEVID_IDENTITY:?missing DEVID_IDENTITY secret}"
          make dmg SIGN_ID="$DEVID_IDENTITY" NOTARY_PROFILE="$NOTARY_PROFILE"

      - name: Locate DMG
        id: dmg
        run: |
          DMG=$(ls build/Tracker*.dmg | head -1)
          VERSIONED="Tracker-${{ steps.v.outputs.version }}.dmg"
          mv "$DMG" "$VERSIONED"
          echo "path=$VERSIONED" >> "$GITHUB_OUTPUT"
          ls -la "$VERSIONED"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true

      # --- Release ---------------------------------------------------------
      - name: Create or push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.v.outputs.tag }}"
          if ! git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS=(--generate-notes --title "Tracker ${{ steps.v.outputs.version }}")
          if [ "${{ steps.v.outputs.prerelease }}" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${{ steps.v.outputs.tag }}" \
            "${ARGS[@]}" \
            "${{ steps.dmg.outputs.path }}"

      # --- Sparkle appcast --------------------------------------------------
      # Regenerate appcast.xml from all current releases and push to
      # gh-pages, where it's served at the URL embedded in Info.plist.
      - name: Cache Sparkle tools
        id: sparkle-cache
        uses: actions/cache@v4
        with:
          path: sparkle-tools
          key: sparkle-${{ env.SPARKLE_VERSION }}

      - name: Download Sparkle tools
        if: steps.sparkle-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p sparkle-tools
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJ -C sparkle-tools

      - name: Generate + publish appcast
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${SPARKLE_ED_PRIVATE_KEY:?missing SPARKLE_ED_PRIVATE_KEY secret}"

          SIGN_UPDATE="$(pwd)/sparkle-tools/bin/sign_update"
          test -x "$SIGN_UPDATE" || { echo "sign_update not found"; exit 1; }

          KEY_FILE="$RUNNER_TEMP/sparkle_ed_private_key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          DMG_DIR="$RUNNER_TEMP/dmgs"
          mkdir -p "$DMG_DIR"

          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq '[.[] | select(.draft == false)]' > "$RUNNER_TEMP/releases.json"

          APPCAST="$RUNNER_TEMP/appcast.xml"
          {
            cat <<EOF
          <?xml version="1.0" standalone="yes"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Tracker</title>
              <link>https://acheris-labs.github.io/tracker/appcast.xml</link>
              <description>Updates for Tracker</description>
              <language>en</language>
          EOF

            jq -c '.[]' "$RUNNER_TEMP/releases.json" | while read -r release; do
              TAG=$(jq -r '.tag_name' <<< "$release")
              VERSION="${TAG#v}"
              PUBLISHED=$(jq -r '.published_at' <<< "$release")
              NOTES_URL=$(jq -r '.html_url' <<< "$release")
              DMG_URL=$(jq -r '.assets[]? | select(.name | endswith(".dmg")) | .browser_download_url' <<< "$release")
              DMG_NAME=$(jq -r '.assets[]? | select(.name | endswith(".dmg")) | .name' <<< "$release")

              [ -z "$DMG_URL" ] && continue

              if [ ! -f "$DMG_DIR/$DMG_NAME" ]; then
                curl -sL -o "$DMG_DIR/$DMG_NAME" "$DMG_URL"
              fi

              SIG_BLOB=$("$SIGN_UPDATE" -f "$KEY_FILE" "$DMG_DIR/$DMG_NAME")
              PUB_RFC822=$(date -j -f "%Y-%m-%dT%H:%M:%SZ" "$PUBLISHED" "+%a, %d %b %Y %H:%M:%S +0000")

              cat <<EOF
              <item>
                <title>Tracker ${VERSION}</title>
                <pubDate>${PUB_RFC822}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:releaseNotesLink>${NOTES_URL}</sparkle:releaseNotesLink>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure url="${DMG_URL}" ${SIG_BLOB} type="application/octet-stream"/>
              </item>
          EOF
            done

            cat <<EOF
            </channel>
          </rss>
          EOF
          } > "$APPCAST"

          rm -f "$KEY_FILE"

          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          PAGES_DIR="$RUNNER_TEMP/pages"
          git worktree add "$PAGES_DIR" gh-pages
          cp "$APPCAST" "$PAGES_DIR/appcast.xml"
          (
            cd "$PAGES_DIR"
            git add appcast.xml
            if git diff --cached --quiet; then
              echo "appcast.xml unchanged; nothing to push"
            else
              git commit -m "appcast: Tracker ${{ steps.v.outputs.version }}"
              git push origin gh-pages
            fi
          )
